<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pawrtner — Vincular mis mascotas</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    /* ── Soft Living tokens (mismos que web_profile) ─────────────── */
    :root {
      --primary: #2D6A4F;
      --primary-light: #52B788;
      --primary-dark: #1B4332;
      --bg: #F8FAF9;
      --surface: #FFFFFF;
      --surface-muted: #F1F4F2;
      --border: #E5E7EB;
      --text-primary: #1A1A2E;
      --text-secondary: #6B7280;
      --text-tertiary: #9CA3AF;
      --warning: #D97706;
      --danger: #DC2626;
      --info: #0891B2;

      --radius-md: 12px;
      --radius-lg: 14px;
      --radius-xl: 16px;
      --radius-xxl: 20px;
      --radius-pill: 999px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0E1411;
        --surface: #1A2320;
        --surface-muted: #222D29;
        --border: #2A3531;
        --text-primary: #E8EBE9;
        --text-secondary: #9AA5A0;
        --text-tertiary: #6B7670;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--bg); }
    body {
      font-family: 'Nunito', system-ui, -apple-system, sans-serif;
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .page {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 40px;
    }

    /* ── Hero ─────────────────────────────────────────────────────── */
    .hero {
      position: relative;
      background: linear-gradient(155deg, var(--primary-dark) 0%, var(--primary) 100%);
      color: white;
      padding: 36px 20px 56px;
      text-align: center;
      overflow: hidden;
    }
    .hero-paws { position: absolute; inset: 0; pointer-events: none; opacity: 0.10; }
    .hero-paws span { position: absolute; font-size: 28px; color: white; }
    .hero-paws span:nth-child(1) { top: 14px; left: 18px; transform: rotate(-18deg); }
    .hero-paws span:nth-child(2) { top: 24px; right: 24px; transform: rotate(22deg); font-size: 22px; }
    .hero-paws span:nth-child(3) { bottom: 50px; left: 28px; font-size: 20px; transform: rotate(34deg); }
    .hero-paws span:nth-child(4) { bottom: 70px; right: 18px; font-size: 26px; transform: rotate(-22deg); }

    .brand {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 800;
      color: rgba(255,255,255,0.92);
      letter-spacing: 0.5px;
      margin-bottom: 18px;
      position: relative; z-index: 1;
    }
    .hero-icon {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: rgba(255,255,255,0.16);
      border: 4px solid white;
      margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 44px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      position: relative; z-index: 1;
    }
    .hero-title {
      font-size: 24px; font-weight: 900;
      color: white;
      letter-spacing: -0.3px;
      position: relative; z-index: 1;
    }
    .hero-sub {
      font-size: 14px; font-weight: 600;
      color: rgba(255,255,255,0.90);
      margin-top: 6px;
      position: relative; z-index: 1;
    }
    .header-curve {
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      width: 100%; height: 32px;
      display: block;
    }

    /* ── Cards ────────────────────────────────────────────────────── */
    .content {
      padding: 16px;
      display: flex; flex-direction: column;
      gap: 14px;
    }
    .sl-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xxl);
      padding: 18px 16px;
    }
    .sl-card h3 {
      font-size: 12px; font-weight: 800;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
    }
    .sl-card p { font-size: 14px; font-weight: 600; color: var(--text-secondary); line-height: 1.5; }

    .vet-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px;
      background: var(--surface-muted);
      border-radius: var(--radius-md);
      margin-bottom: 12px;
    }
    .vet-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--primary) 14%, transparent);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .vet-label { font-size: 11px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.4px; }
    .vet-name  { font-size: 14px; font-weight: 800; color: var(--text-primary); }

    .pet-list {
      display: flex; flex-direction: column;
      gap: 8px;
    }
    .pet-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      background: color-mix(in srgb, var(--primary) 6%, transparent);
      border: 1px solid color-mix(in srgb, var(--primary) 18%, transparent);
      border-radius: var(--radius-md);
    }
    .pet-emoji { font-size: 22px; }
    .pet-name  { font-size: 14px; font-weight: 800; color: var(--text-primary); }

    /* ── Buttons ──────────────────────────────────────────────────── */
    .actions { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
    .sl-btn-primary, .sl-btn-soft, .sl-btn-store {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px;
      height: 52px; padding: 0 20px;
      border: none; border-radius: var(--radius-lg);
      font-family: inherit; font-weight: 800; font-size: 15px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }
    .sl-btn-primary {
      background: var(--primary); color: white;
      box-shadow: 0 6px 16px color-mix(in srgb, var(--primary) 32%, transparent);
    }
    .sl-btn-soft {
      background: color-mix(in srgb, var(--primary) 12%, transparent);
      color: var(--primary);
    }
    .sl-btn-store {
      background: #111; color: white;
      font-size: 13px; font-weight: 700;
      gap: 12px; height: 56px;
    }
    .sl-btn-primary:active, .sl-btn-soft:active, .sl-btn-store:active { transform: translateY(1px); }
    .sl-btn-store .store-icon { font-size: 22px; }
    .sl-btn-store .store-text { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.1; }
    .sl-btn-store .store-text small { font-size: 10px; font-weight: 600; opacity: 0.85; letter-spacing: 0.4px; }
    .sl-btn-store .store-text strong { font-size: 14px; font-weight: 800; }

    /* ── Tinted (banner alerta) ───────────────────────────────────── */
    .sl-tinted {
      border-radius: var(--radius-xxl);
      padding: 14px 16px;
      display: flex; gap: 12px;
      align-items: flex-start;
    }
    .sl-tinted-warning {
      background: color-mix(in srgb, var(--warning) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--warning) 28%, transparent);
      color: var(--warning);
    }
    .sl-tinted-danger {
      background: color-mix(in srgb, var(--danger) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--danger) 28%, transparent);
      color: var(--danger);
    }
    .sl-tinted-icon { font-size: 20px; flex-shrink: 0; line-height: 1.2; }
    .sl-tinted-body { flex: 1; }
    .sl-tinted-title { font-size: 13px; font-weight: 800; margin-bottom: 2px; }
    .sl-tinted-text  { font-size: 13px; font-weight: 600; opacity: 0.92; }

    /* ── Footer ───────────────────────────────────────────────────── */
    .page-footer {
      text-align: center;
      padding: 20px 16px 0;
      font-size: 11px; font-weight: 700;
      color: var(--text-tertiary);
      letter-spacing: 0.4px;
    }
    .page-footer span { color: var(--primary); font-weight: 800; }

    /* ── State ────────────────────────────────────────────────────── */
    .state-screen {
      min-height: 60vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 48px 24px; text-align: center;
      gap: 12px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state-screen h2 { font-size: 20px; font-weight: 800; color: var(--text-primary); }
    .state-screen p  { font-size: 14px; font-weight: 600; color: var(--text-secondary); }
    .state-emoji { font-size: 56px; }
  </style>
</head>
<body>
  <main class="page" id="page">
    <div class="state-screen">
      <div class="spinner"></div>
      <p>Cargando invitación...</p>
    </div>
  </main>

  <script>
    const SUPABASE_URL = 'https://czpfboiqtefmefvmvmsx.supabase.co';
    const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6cGZib2lxdGVmbWVmdm12bXN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MDg5MTYsImV4cCI6MjA5MTA4NDkxNn0.kuGlOWVIS4P81ablwFHY2_WEoUij2PX71fHIPHNiESg';

    // Package name del Android app (definido en build.gradle).
    const ANDROID_PACKAGE = 'app.pawrtner.mobile';
    // Play Store + (placeholder) App Store. Reemplazar AppStore al publicar.
    const PLAY_URL = `https://play.google.com/store/apps/details?id=${ANDROID_PACKAGE}`;
    const APP_STORE_URL = 'https://apps.apple.com/cl/app/pawrtner/id000000000';

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    function getToken() {
      const params = new URLSearchParams(window.location.search);
      return params.get('token') || '';
    }

    function renderError(emoji, title, body) {
      document.getElementById('page').innerHTML = `
        <div class="state-screen">
          <div class="state-emoji">${emoji}</div>
          <h2>${escapeHtml(title)}</h2>
          <p>${escapeHtml(body)}</p>
        </div>`;
    }

    function buildOpenInAppHref() {
      // Android: intent:// con package fallback abre la app si esta,
      // o redirige a Play Store si no esta. iOS no soporta intent://;
      // como AndroidManifest tiene autoVerify=true, el sistema ya
      // intenta abrir la app antes de cargar este HTML. Si llegamos
      // aqui es porque la app no esta instalada, asi que el boton
      // simplemente apunta a la store.
      const ua = navigator.userAgent || '';
      const isAndroid = /android/i.test(ua);
      const isIOS = /iphone|ipad|ipod/i.test(ua);
      if (isAndroid) {
        const fullUrl = window.location.href;
        return `intent://${fullUrl.replace(/^https?:\/\//, '')}#Intent;scheme=https;package=${ANDROID_PACKAGE};S.browser_fallback_url=${encodeURIComponent(PLAY_URL)};end`;
      }
      if (isIOS) return APP_STORE_URL;
      return PLAY_URL;
    }

    async function previewToken(token) {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/preview_walkin_owner_by_token`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            apikey: ANON_KEY,
            Authorization: `Bearer ${ANON_KEY}`,
          },
          body: JSON.stringify({ p_token: token }),
        });
        if (!res.ok) return null;
        const data = await res.json();
        if (!Array.isArray(data) || data.length === 0) return null;
        return data[0];
      } catch (_) {
        return null;
      }
    }

    async function load() {
      const token = getToken();
      if (!token || token.length < 10) {
        renderError('🔗', 'Link inválido', 'Verifica que el enlace que recibiste esté completo.');
        return;
      }

      const preview = await previewToken(token);
      if (!preview || !preview.found) {
        renderError('🐾', 'Invitación no encontrada', 'Es posible que el enlace haya expirado. Pide al profesional que lo genere de nuevo.');
        return;
      }

      const alreadyClaimed = !!preview.already_claimed;
      const vetName = preview.vet_name || 'Tu profesional';
      const petNames = Array.isArray(preview.pet_names) ? preview.pet_names : [];

      // ── Hero ──────────────────────────────────────────────────────
      const heroHtml = `
        <section class="hero">
          <div class="hero-paws" aria-hidden="true">
            <span>🐾</span><span>🐾</span><span>🐾</span><span>🐾</span>
          </div>
          <div class="brand">🐾 PAWRTNER</div>
          <div class="hero-icon">🤝</div>
          <div class="hero-title">Vincula tus mascotas</div>
          <div class="hero-sub">${escapeHtml(vetName)} las registró por ti</div>
          <svg class="header-curve" viewBox="0 0 100 4" preserveAspectRatio="none" aria-hidden="true">
            <path d="M0 0 C 33 4 67 4 100 0 V 4 H 0 Z" fill="var(--bg)"/>
          </svg>
        </section>
      `;

      // ── Estado ya reclamado ───────────────────────────────────────
      if (alreadyClaimed) {
        document.getElementById('page').innerHTML = `
          ${heroHtml}
          <div class="content">
            <div class="sl-tinted sl-tinted-warning">
              <div class="sl-tinted-icon">✓</div>
              <div class="sl-tinted-body">
                <div class="sl-tinted-title">Ya vinculadas</div>
                <div class="sl-tinted-text">Estas mascotas ya están en una cuenta de Pawrtner. Si crees que es un error, pide al profesional que genere un link nuevo.</div>
              </div>
            </div>
            <div class="sl-card">
              <h3>Abrir Pawrtner</h3>
              <p>Si tenés la app instalada, abrí Pawrtner para ver tus mascotas en tu cuenta.</p>
              <div class="actions">
                <a class="sl-btn-primary" href="${buildOpenInAppHref()}">Abrir Pawrtner</a>
              </div>
            </div>
          </div>
          <footer class="page-footer">
            <span>Pawrtner</span> · pawrtner.com
          </footer>`;
        return;
      }

      // ── Lista de mascotas ─────────────────────────────────────────
      const petsHtml = petNames.length
        ? `<div class="pet-list">${petNames.map(n => `
            <div class="pet-row">
              <span class="pet-emoji">🐾</span>
              <span class="pet-name">${escapeHtml(n)}</span>
            </div>`).join('')}</div>`
        : '<p>El profesional registró información médica que ahora podrás vincular a tu cuenta.</p>';

      const petsCard = `
        <div class="sl-card">
          <h3>${petNames.length === 1 ? 'Mascota a vincular' : 'Mascotas a vincular'}</h3>
          <div class="vet-row">
            <div class="vet-icon">🩺</div>
            <div>
              <div class="vet-label">Registrado por</div>
              <div class="vet-name">${escapeHtml(vetName)}</div>
            </div>
          </div>
          ${petsHtml}
        </div>`;

      // ── Card abrir app ────────────────────────────────────────────
      const openAppCard = `
        <div class="sl-card">
          <h3>1. Abrir Pawrtner</h3>
          <p>Si ya tenés la app instalada, abrila y aceptá la invitación. Si no, descargala primero.</p>
          <div class="actions">
            <a class="sl-btn-primary" href="${buildOpenInAppHref()}">Abrir Pawrtner</a>
          </div>
        </div>`;

      // ── Card stores ───────────────────────────────────────────────
      const storesCard = `
        <div class="sl-card">
          <h3>2. ¿No tenés la app?</h3>
          <p>Descargala gratis. Después abrí este mismo enlace para terminar la vinculación.</p>
          <div class="actions">
            <a class="sl-btn-store" href="${PLAY_URL}" target="_blank" rel="noopener">
              <span class="store-icon">▶</span>
              <span class="store-text">
                <small>DISPONIBLE EN</small>
                <strong>Google Play</strong>
              </span>
            </a>
            <a class="sl-btn-store" href="${APP_STORE_URL}" target="_blank" rel="noopener">
              <span class="store-icon"></span>
              <span class="store-text">
                <small>DISPONIBLE EN</small>
                <strong>App Store</strong>
              </span>
            </a>
          </div>
        </div>`;

      document.getElementById('page').innerHTML = `
        ${heroHtml}
        <div class="content">
          ${petsCard}
          ${openAppCard}
          ${storesCard}
        </div>
        <footer class="page-footer">
          <span>Pawrtner</span> · pawrtner.com
        </footer>`;
    }

    load();
  </script>
</body>
</html>
