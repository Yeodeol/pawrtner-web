# Descargo de Responsabilidad Médico-Veterinario

**Última actualización:** 30 de mayo de 2026

Este Descargo forma parte integrante de los **Términos y Condiciones de Uso** de
Pawrtner y debe leerse en conjunto con ellos.

---

## 1. Carácter informativo y organizativo

1.1. **Pawrtner es una herramienta de organización y registro de información sobre
mascotas.** Toda la información contenida o generada en la Plataforma —incluyendo,
sin limitación, fichas médicas, vacunas, tratamientos, dosis de medicamentos,
alergias, comidas, recordatorios, alertas y próximos eventos— tiene **carácter
exclusivamente informativo y organizativo**.

1.2. Dicha información **NO constituye consejo, diagnóstico, prescripción ni
indicación médica o veterinaria** de ninguna especie.

---

## 2. No sustituye al médico veterinario

2.1. **Pawrtner NO reemplaza la consulta, el diagnóstico ni el tratamiento de un
médico veterinario u otro profesional certificado.**

2.2. Las decisiones sobre la salud, alimentación, medicación, tratamiento o
cuidado de una mascota deben adoptarse **siempre con la asesoría de un profesional
veterinario habilitado**. Ante cualquier duda, síntoma o emergencia, el Usuario
debe acudir directamente a un profesional.

---

## 3. Alertas, recordatorios y datos ingresados por el Usuario

3.1. Las **alertas de interacción alergia-medicamento, los recordatorios de
medicamentos o comidas y cualquier aviso** generados por la Plataforma son
**funciones informativas de apoyo, no diagnósticas**, y se basan en datos que el
propio Usuario ingresa.

3.2. **Pawrtner no verifica ni garantiza la exactitud, completitud o vigencia** de
la información ingresada por los Usuarios. La correcta administración de
medicamentos, dosis y horarios es responsabilidad exclusiva del Usuario y del
profesional tratante.

3.3. **Las notificaciones y recordatorios no deben utilizarse como único medio**
para administrar medicamentos o gestionar atenciones críticas, dado que su entrega
depende de factores ajenos a Pawrtner (sistema operativo, conectividad,
configuración del dispositivo y servicios de terceros).

---

## 4. Profesionales del marketplace

4.1. Pawrtner **conecta** a Dueños con Profesionales independientes, pero **no los
emplea, no los avala y no garantiza** su idoneidad, habilitación ni el resultado de
sus servicios.

4.2. La relación profesional-cliente, el diagnóstico, el tratamiento y sus
consecuencias son de **responsabilidad exclusiva del Profesional y del Dueño**, sin
intervención ni responsabilidad de Pawrtner.

---

## 5. Emergencias

**Pawrtner no es un servicio de urgencias.** En caso de emergencia de salud de una
mascota, el Usuario debe contactar de inmediato a un veterinario o a un centro de
atención de urgencias veterinarias.

---

## 6. Exención de responsabilidad

En la máxima medida permitida por la legislación chilena, y sin afectar los
derechos irrenunciables que la Ley N° 19.496 reconoce a los consumidores, **el
Usuario asume la responsabilidad por el uso que haga de la información de la
Plataforma**, y Pawrtner no será responsable por daños o perjuicios derivados de
decisiones adoptadas sobre la base de dicha información.

---

## 7. Aceptación

El uso de la Plataforma implica la lectura, comprensión y aceptación de este
Descargo de Responsabilidad Médico-Veterinario.
