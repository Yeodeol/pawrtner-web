# Política de Privacidad de Pawrtner

**Última actualización:** 30 de mayo de 2026

---

## 1. Responsable del tratamiento

El responsable del tratamiento de los datos personales recopilados a través de la
plataforma **Pawrtner** (la **"Plataforma"**) es **Cristofher Andres Garcia Mura**, RUT **17.850.323-5**, domiciliado en **Ignacio Carrera Pinto 4971, Macul, Chile**.

Contacto en materia de privacidad: **privacidad@pawrtner.app**.

---

## 2. Marco legal

El tratamiento de datos personales se realiza conforme a la legislación chilena
vigente, en especial:
- **Ley N° 19.628** sobre Protección de la Vida Privada.
- **Ley N° 21.719** que regula la protección y el tratamiento de los datos
  personales y crea la Agencia de Protección de Datos Personales.
- **Artículo 19 N° 4 de la Constitución Política de la República**.

---

## 3. Datos que recopilamos

Recopilamos únicamente los datos necesarios para prestar el Servicio:

### 3.1. Datos de la cuenta y de identificación
- Nombre o nombre de usuario, correo electrónico, número de teléfono.
- Fotografía de perfil (avatar), si el Usuario la proporciona.
- Identificadores de autenticación (incluido inicio de sesión con Google).

### 3.2. Datos de ubicación
- Ubicación aproximada o comuna, y/o ubicación GPS del dispositivo **cuando el
  Usuario lo autoriza**, con el fin de buscar Profesionales cercanos. El Usuario
  puede denegar o revocar este permiso desde la configuración de su dispositivo.

### 3.3. Datos de las mascotas (ingresados por el Usuario)
- Nombre, especie, raza, sexo, fecha de nacimiento, peso, color, fotografías.
- Historial médico, vacunas, tratamientos, medicamentos y recordatorios,
  alergias, comidas programadas y eventos.

> Estos datos se refieren a animales; no constituyen datos personales sensibles
> del Usuario, pero se tratan con la misma diligencia y confidencialidad.

### 3.4. Datos de Profesionales
- Nombre, profesión, biografía, teléfono, correo, dirección y/o coordenadas del
  lugar de atención, servicios, disponibilidad y datos de contacto bancario que el
  Profesional decida incluir para recibir pagos.

### 3.5. Datos de actividad y técnicos
- Citas, reseñas, comprobantes de pago cargados por el Usuario, y registros de uso.
- Identificadores de dispositivo para notificaciones push (tokens), versión de la
  aplicación e idioma.
- Registros técnicos y de errores para diagnóstico y mejora del Servicio.

### 3.6. Datos de pago
- Pawrtner **no recopila ni almacena datos de tarjetas**. Las compras y
  suscripciones se procesan a través de **Google Play**, que actúa como
  intermediario de pago.

---

## 4. Cómo obtenemos los datos

Obtenemos los datos: (i) directamente del Usuario al registrarse y usar la
Plataforma; (ii) de forma automática por el uso de la aplicación (datos técnicos);
y (iii) en el caso de "walk-ins", un Profesional puede registrar datos básicos de
contacto de un Dueño que aún no tiene cuenta, los que dicho Dueño podrá vincular o
solicitar eliminar al instalar la aplicación.

---

## 5. Finalidades y base de licitud del tratamiento

| Finalidad | Base de licitud |
|---|---|
| Crear y administrar la cuenta del Usuario | Ejecución del contrato / consentimiento |
| Mostrar y sincronizar fichas de mascotas (incl. co-dueños) | Ejecución del contrato / consentimiento |
| Buscar Profesionales por cercanía | Consentimiento (ubicación) |
| Gestionar citas, pagos manuales y reseñas | Ejecución del contrato |
| Enviar recordatorios y notificaciones | Consentimiento / interés legítimo |
| Mostrar el perfil público de mascota perdida (QR) | **Consentimiento expreso** del Dueño |
| Seguridad, prevención de fraude y soporte | Interés legítimo / obligación legal |
| Mejora del Servicio y estadísticas | Interés legítimo |

---

## 6. Datos que se hacen públicos (perfil de mascota / QR)

El Usuario reconoce que, al activar o compartir el **código QR / perfil público de
su mascota**, determinada información (datos de la mascota y **datos de contacto del
Dueño y co-dueños, incluido teléfono**) quedará **accesible públicamente** a quien
acceda al enlace, con la finalidad de facilitar la recuperación en caso de
extravío. Esta exposición se realiza **con el consentimiento expreso del Dueño** y
bajo su control.

---

## 7. Con quién compartimos datos (encargados de tratamiento)

No vendemos datos personales. Para operar, utilizamos proveedores de servicios
("encargados de tratamiento") que procesan datos por cuenta y bajo instrucción de
Pawrtner:

| Proveedor | Finalidad | Observación |
|---|---|---|
| **Supabase** | Base de datos, autenticación y almacenamiento de archivos | Infraestructura en la nube |
| **Google (Firebase Cloud Messaging)** | Envío de notificaciones push | — |
| **Google Play** | Procesamiento de compras y suscripciones | Intermediario de pago |
| **Resend** | Envío de correos transaccionales (invitaciones, citas) | — |
| **Cloudflare** | DNS y alojamiento de sitios web públicos | — |

**Transferencia internacional:** algunos de estos proveedores alojan o procesan
datos **en servidores ubicados fuera de Chile** (por ejemplo, en Estados Unidos).
Al utilizar la Plataforma, el Usuario es informado de esta circunstancia. Pawrtner
adopta medidas razonables para que dichos proveedores ofrezcan niveles adecuados de
protección.

Asimismo, podremos divulgar datos cuando sea requerido por **ley, autoridad
competente o resolución judicial**.

---

## 8. Conservación de los datos

Conservamos los datos mientras la cuenta esté activa y por el plazo necesario para
cumplir las finalidades descritas o las obligaciones legales aplicables. Una vez
eliminada la cuenta, los datos se suprimen o anonimizan en un plazo razonable,
salvo aquellos que debamos conservar por exigencia legal.

---

## 9. Seguridad

Aplicamos medidas técnicas y organizativas razonables para proteger los datos
(control de acceso por usuario mediante reglas de seguridad a nivel de base de
datos, cifrado en tránsito, almacenamiento de archivos privados con enlaces
temporales firmados, etc.). Ningún sistema es completamente infalible; el Usuario
contribuye a la seguridad protegiendo sus credenciales.

---

## 10. Derechos del titular de datos

Conforme a la Ley N° 19.628 y a la Ley N° 21.719, el Usuario puede ejercer sus
derechos de:
- **Acceso** a sus datos.
- **Rectificación** de datos inexactos o desactualizados.
- **Cancelación / supresión** de sus datos.
- **Oposición** al tratamiento.
- **Portabilidad** de sus datos.
- **Bloqueo** del tratamiento, cuando corresponda.

Para ejercerlos, el Usuario puede escribir a **privacidad@pawrtner.app**.
Responderemos en los plazos que la ley establezca. El Usuario también podrá
reclamar ante la **Agencia de Protección de Datos Personales** cuando ésta se
encuentre en funcionamiento.

---

## 11. Eliminación de cuenta

El Usuario puede solicitar la eliminación de su cuenta y datos asociados desde la
propia aplicación o escribiendo a **privacidad@pawrtner.app**. La eliminación de
la cuenta del Dueño conlleva la supresión de las fichas de mascotas de las que sea
titular, sin perjuicio de la información que deba conservarse por obligación legal
o que pertenezca a otros Usuarios (por ejemplo, co-dueños o Profesionales).

---

## 12. Menores de edad

La Plataforma **no está dirigida a menores de 18 años** y no recopila
deliberadamente sus datos. Si tomamos conocimiento de que un menor ha
proporcionado datos sin la debida autorización, procederemos a eliminarlos.

---

## 13. Cookies y tecnologías similares

Los sitios web públicos de Pawrtner (perfil de mascota, vinculación, etc.) pueden
utilizar tecnologías estrictamente necesarias para su funcionamiento y, en su caso,
herramientas de medición de uso. La aplicación móvil utiliza identificadores
técnicos para funciones como las notificaciones.

---

## 14. Cambios a esta Política

Podremos actualizar esta Política. Los cambios sustanciales se informarán a través
de la Plataforma o por correo electrónico, indicando la fecha de última
actualización.

---

## 15. Contacto

Para consultas o para ejercer derechos en materia de datos personales:
**privacidad@pawrtner.app**.
