# Términos y Condiciones de Uso de Pawrtner

**Última actualización:** 30 de mayo de 2026
**Vigencia:** desde su aceptación por el Usuario.

---

La aplicación y plataforma **"Pawrtner"** (en adelante, la **"Plataforma"** o el
**"Servicio"**) es operada por **Cristofher Andres Garcia Mura**, RUT
**17.850.323-5**, con domicilio en **Ignacio Carrera Pinto 4971, Macul, Chile** (en adelante, el **"Titular"** o

Para todo efecto, el correo de contacto es **legal@pawrtner.app** y el sitio

---

## 2. Aceptación de los Términos

2.1. El presente documento regula el acceso y uso de la Plataforma, incluyendo la
aplicación móvil para dueños de mascotas, el panel web para profesionales
("Pawrtner Enterprise") y los sitios públicos asociados (perfil de mascota vía
código QR, vinculación de mascotas y demás subdominios de `pawrtner.app`).

2.2. Al registrarse, acceder o utilizar la Plataforma, el Usuario declara haber
leído, comprendido y aceptado íntegramente estos Términos y Condiciones (los
**"Términos"**), la **Política de Privacidad** y el **Descargo de Responsabilidad
Médico-Veterinario**, los que forman parte integrante de este documento.

2.3. Si el Usuario no está de acuerdo con los Términos, debe abstenerse de
utilizar la Plataforma.

---

## 3. Definiciones

- **Usuario**: toda persona que accede o utiliza la Plataforma, en calidad de
  Dueño, Profesional o visitante.
- **Dueño**: Usuario que registra y administra fichas de una o más mascotas.
- **Profesional**: Usuario que ofrece servicios para mascotas (veterinario,
  peluquero, entrenador, nutricionista u otros) y gestiona su agenda, servicios y
  citas desde el panel correspondiente.
- **Contenido del Usuario**: toda información, dato, texto, imagen, ficha médica,
  reseña o material que el Usuario ingresa, carga o transmite a través de la
  Plataforma.
- **Servicios de Terceros**: servicios prestados por Profesionales u otros
  terceros, ajenos a Pawrtner.

---

## 4. Naturaleza del Servicio — Pawrtner es una plataforma intermediaria

4.1. **Pawrtner es una plataforma tecnológica de carácter informativo y de
intermediación**, cuya finalidad es **facilitar la organización, registro y
visibilización de información** sobre mascotas, y **conectar** a Dueños con
Profesionales independientes.

4.2. **Pawrtner NO presta servicios veterinarios, de salud animal, de peluquería,
de entrenamiento, ni ningún otro servicio profesional para mascotas.** Pawrtner no
es una clínica, no emplea a los Profesionales, no los supervisa y no participa en
la prestación de sus servicios.

4.3. **Pawrtner no es parte de la relación contractual** que se genere entre un
Dueño y un Profesional. Cualquier acuerdo, atención, diagnóstico, tratamiento,
cobro o servicio es responsabilidad exclusiva de las partes que lo celebran.
Pawrtner se limita a proveer las herramientas tecnológicas para que dicha relación
pueda gestionarse.

4.4. **Pawrtner no garantiza** la idoneidad, habilitación, certificación,
disponibilidad, calidad, puntualidad ni resultado de los servicios ofrecidos por
los Profesionales, ni la veracidad de la información publicada por ellos o por los
Dueños. La verificación de credenciales profesionales es responsabilidad del
Usuario.

4.5. La información mostrada en la Plataforma (fichas, recordatorios, alertas de
alergias o medicamentos, próximos eventos, etc.) tiene **carácter meramente
informativo y organizativo**, es ingresada por los propios Usuarios y **no
constituye consejo, diagnóstico ni indicación médica, veterinaria o de ningún
tipo**. Véase el **Descargo de Responsabilidad Médico-Veterinario**.

## 5. Registro, cuenta y edad mínima

5.1. Para utilizar las funciones que requieren cuenta, el Usuario debe registrarse
proporcionando información veraz, exacta y actualizada.

5.2. **El Servicio está dirigido a personas mayores de 18 años.** Al registrarse,
el Usuario declara ser mayor de edad y tener plena capacidad legal para contratar.

5.3. El Usuario es responsable de mantener la confidencialidad de sus credenciales
y de toda actividad realizada desde su cuenta. Debe notificar de inmediato a
Pawrtner cualquier uso no autorizado.

5.4. Pawrtner podrá suspender o cancelar cuentas que infrinjan estos Términos, que
contengan información falsa o que se utilicen de forma fraudulenta o abusiva.

## 6. Uso aceptable

6.1. El Usuario se obliga a utilizar la Plataforma conforme a la ley, el orden
público, la moral y las buenas costumbres.

6.2. Queda prohibido, de forma enunciativa y no taxativa:
- Cargar contenido falso, engañoso, difamatorio, ofensivo o ilícito.
- Suplantar la identidad de terceros o publicar datos de terceros sin

- Vulnerar derechos de propiedad intelectual o de privacidad.
- Introducir software malicioso, realizar ingeniería inversa, scraping masivo o
  intentar acceder a datos de otros Usuarios.
- Utilizar la Plataforma para fines distintos a los previstos.

## 7. Contenido del Usuario

7.1. El Usuario es el **único responsable** del Contenido que ingresa, incluida su
exactitud, legalidad y la tenencia de los derechos o autorizaciones necesarias.

7.2. El Usuario conserva la titularidad de su Contenido y otorga a Pawrtner una
licencia limitada, no exclusiva y gratuita para alojar, procesar y mostrar dicho
Contenido **con el único fin de prestar el Servicio** (por ejemplo, sincronizar
fichas entre co-dueños, mostrar el perfil público de una mascota perdida, o
exhibir reseñas).

7.3. Pawrtner no revisa de forma previa el Contenido del Usuario, pero podrá
removerlo si infringe estos Términos o la ley.

## 8. Mascota perdida y perfil público (código QR)

8.1. La Plataforma ofrece una función mediante la cual cada mascota cuenta con un
**código QR** que enlaza a un **perfil público** destinado a facilitar su
recuperación en caso de extravío.

8.2. **El Dueño reconoce y consiente expresamente** que dicho perfil público puede
mostrar datos de la mascota y **datos de contacto del Dueño y co-dueños (incluido
número de teléfono)** a cualquier persona que acceda al enlace o escanee el código,
con la finalidad de permitir el contacto en caso de pérdida.

8.3. El Dueño es responsable de la información que decide exponer y de mantener
actualizados sus datos de contacto.

## 9. Marketplace de Profesionales, citas y reseñas

9.1. Los Profesionales son **terceros independientes**. Pawrtner no los avala ni
responde por sus actos u omisiones.

9.2. Las reservas, confirmaciones, reprogramaciones, cancelaciones y la prestación
efectiva del servicio se rigen por las condiciones que cada Profesional establezca
(incluida su política de cancelación). Pawrtner provee la herramienta de agenda,
pero no garantiza la concurrencia ni el resultado.

9.3. Las **reseñas** reflejan la opinión de los Usuarios que las emiten. Pawrtner
no se responsabiliza por su contenido, sin perjuicio de su facultad de moderar
reseñas que infrinjan estos Términos.

## 10. Pagos, suscripciones y compras

10.1. **Suscripciones de Profesionales (planes Pro / Pro+) y compra de "Pawrtner
Plus" (pago único de Dueño)** se procesan a través de **Google Play Billing**.
Google actúa como intermediario de pago ("merchant of record"); Pawrtner **no
almacena ni procesa datos de tarjetas de crédito o débito**.

10.2. Los precios, renovaciones, periodos de prueba y reembolsos se rigen
adicionalmente por las **políticas de Google Play** y por la información mostrada al
momento de la compra. El Usuario puede gestionar o cancelar sus suscripciones desde
su cuenta de Google Play.

10.3. **Pagos por servicios profesionales (efectivo o transferencia)**: cuando un
Dueño paga directamente a un Profesional (en efectivo o mediante transferencia
bancaria), dicho pago ocurre **exclusivamente entre el Dueño y el Profesional**.
Pawrtner solo facilita el registro o comprobante del pago como herramienta
informativa, **no recibe, retiene ni intermedia dichos fondos** y no es responsable
por disputas, montos, devoluciones o incumplimientos asociados.

10.4. Los derechos del consumidor establecidos en la **Ley N° 19.496** se
mantienen vigentes en todo lo que resulte aplicable.

## 12. Limitación de responsabilidad

> **Las siguientes limitaciones se aplican en la máxima medida permitida por la

> irrenunciables que la Ley N° 19.496 reconoce a los consumidores.**

12.1. La Plataforma se provee **"tal cual" y "según disponibilidad"**, sin
garantías implícitas de comerciabilidad, idoneidad para un fin particular o
disponibilidad ininterrumpida.

12.2. **Pawrtner es una plataforma informativa y de intermediación.** En
consecuencia, y en la máxima medida permitida por la ley, **Pawrtner no será
responsable** por:
- (a) Las decisiones que el Usuario adopte sobre la salud, alimentación,
  tratamiento o cuidado de su mascota basándose en la información de la Plataforma.
- (b) La exactitud, completitud o vigencia del Contenido ingresado por los
  Usuarios (fichas médicas, dosis, alergias, fechas, recordatorios, etc.).
- (c) Los actos, omisiones, negligencia, calidad o resultado de los servicios
  prestados por Profesionales u otros terceros.
- (d) El incumplimiento, retraso, error o falta de entrega de **notificaciones o
  recordatorios** (locales o push), los que dependen de factores ajenos a Pawrtner
  (sistema operativo del dispositivo, conectividad, configuración del usuario,
  servicios de terceros como Google Firebase, etc.) y **no deben utilizarse como
  único medio para administrar medicamentos o atenciones críticas**.
- (e) Interrupciones, fallos, pérdida de datos o indisponibilidad derivados de
  causas técnicas, mantenimientos o de proveedores de infraestructura.
- (f) Daños indirectos, lucro cesante o perjuicios consecuenciales.

12.3. En la máxima medida permitida por la ley, la responsabilidad total de
Pawrtner frente al Usuario, por cualquier causa, se limitará al monto efectivamente
pagado por dicho Usuario a Pawrtner en los **doce (12) meses** anteriores al hecho
que origine la responsabilidad. Para Usuarios que no han efectuado pago alguno,
dicho límite será el equivalente en pesos a **una (1) Unidad de Fomento (UF)**.
